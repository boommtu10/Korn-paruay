<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#3d1f00">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="เสี่ยกร พารวย">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>เสี่ยกร พารวย</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=Noto+Sans+Thai:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C9A84C;
  --gold-light: #F5E6B3;
  --gold-dark: #8A6A1E;
  --red: #B5151B;
  --red-light: #FDECEA;
  --green: #1A7A3C;
  --green-light: #E6F4ED;
  --blue: #1A4F8A;
  --blue-light: #E6EFF9;
  --bg: #FDF8EE;
  --surface: #FFFFFF;
  --border: #E8D9A0;
  --text: #2C1F08;
  --text-secondary: #7A6035;
  --text-muted: #B0955A;
  --pending: #D97706;
  --pending-bg: #FEF3C7;
  --paid: #059669;
  --paid-bg: #D1FAE5;
  --radius: 10px;
  --shadow: 0 2px 8px rgba(44,31,8,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Sarabun', 'Noto Sans Thai', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* === HEADER === */
.header {
  background: linear-gradient(135deg, #1a0a00 0%, #3d1f00 50%, #1a0a00 100%);
  padding: 16px 20px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 3px solid var(--gold);
  position: sticky; top: 0; z-index: 100;
}
.header-brand { display: flex; align-items: center; gap: 10px; }
.header-logo {
  width: 40px; height: 40px; background: var(--gold);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 700; color: #1a0a00;
}
.header-title { color: var(--gold); font-size: 18px; font-weight: 700; line-height: 1.2; }
.header-sub { color: var(--text-muted); font-size: 12px; }

/* === NAV === */
.nav { display: flex; background: #2c1000; border-bottom: 2px solid var(--gold); overflow-x: auto; }
.nav-btn {
  flex: 1; min-width: 80px; padding: 12px 8px; border: none; background: none;
  color: var(--text-muted); font-family: inherit; font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all 0.2s; white-space: nowrap; border-bottom: 3px solid transparent;
}
.nav-btn:hover { color: var(--gold-light); background: rgba(201,168,76,0.08); }
.nav-btn.active { color: var(--gold); border-bottom-color: var(--gold); background: rgba(201,168,76,0.12); }

/* === PAGES === */
.page { display: none; padding: 20px; max-width: 900px; margin: 0 auto; }
.page.active { display: block; }

/* === CARDS === */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px; margin-bottom: 16px;
  box-shadow: var(--shadow);
}
.card-title {
  font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 16px;
  padding-bottom: 12px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.card-title-icon {
  width: 28px; height: 28px; background: var(--gold-light);
  border-radius: 6px; display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}

/* === FORMS === */
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.form-row.single { grid-template-columns: 1fr; }
.form-row.triple { grid-template-columns: 1fr 1fr 1fr; }
@media (max-width: 600px) {
  .form-row { grid-template-columns: 1fr; }
  .form-row.triple { grid-template-columns: 1fr 1fr; }
}
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-label { font-size: 13px; font-weight: 600; color: var(--text-secondary); }
.form-input, .form-select {
  padding: 10px 12px; border: 1.5px solid var(--border);
  border-radius: 8px; font-family: inherit; font-size: 14px; color: var(--text);
  background: var(--surface); transition: border-color 0.2s;
  width: 100%;
}
.form-input:focus, .form-select:focus {
  outline: none; border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,0.15);
}
.form-input.lotto-input { font-size: 22px; font-weight: 700; letter-spacing: 6px; text-align: center; }

/* === BUTTONS === */
.btn {
  padding: 10px 20px; border-radius: 8px; border: none;
  font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer;
  transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px;
}
.btn-gold {
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
  color: #1a0a00;
}
.btn-gold:hover { filter: brightness(1.08); transform: translateY(-1px); }
.btn-outline {
  background: none; border: 1.5px solid var(--border);
  color: var(--text-secondary);
}
.btn-outline:hover { border-color: var(--gold); color: var(--gold-dark); }
.btn-danger { background: var(--red); color: #fff; }
.btn-danger:hover { background: #8B1015; }
.btn-green { background: var(--green); color: #fff; }
.btn-green:hover { background: #155a2d; }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-full { width: 100%; justify-content: center; }

/* === LOTTERY GRID === */
.lottery-input-row {
  display: grid; grid-template-columns: 1fr auto auto auto;
  gap: 8px; align-items: end; margin-bottom: 8px;
}
@media (max-width: 600px) {
  .lottery-input-row { grid-template-columns: 1fr 1fr; }
  .lottery-input-row .lotto-num { grid-column: 1 / -1; }
}
.lotto-list { margin-top: 12px; }
.lotto-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px; background: var(--bg); border-radius: 8px;
  margin-bottom: 6px; border: 1px solid var(--border);
}
.lotto-num-badge {
  font-size: 18px; font-weight: 700; letter-spacing: 4px;
  color: var(--red); background: var(--red-light);
  padding: 4px 12px; border-radius: 6px;
}
.lotto-count-badge {
  font-size: 12px; color: var(--text-secondary);
  background: var(--gold-light); padding: 3px 8px; border-radius: 20px;
}

/* === NUMBER GRID === */
.search-bar {
  display: flex; gap: 8px; margin-bottom: 16px;
}
.search-bar input { flex: 1; }
.number-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
  gap: 8px;
}
.num-cell {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 8px; padding: 10px 6px;
  text-align: center; cursor: pointer; transition: all 0.15s;
  position: relative; overflow: hidden;
}
.num-cell:hover { border-color: var(--gold); transform: translateY(-2px); box-shadow: var(--shadow); }
.num-cell .num { font-size: 16px; font-weight: 700; color: var(--red); letter-spacing: 2px; }
.num-cell .copies { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.num-cell.sold { background: #F5F5F5; cursor: not-allowed; border-color: #DDD; }
.num-cell.sold .num { color: #AAA; }
.num-cell.pending { background: var(--pending-bg); border-color: var(--pending); }
.num-cell.pending .num { color: var(--pending); }
.num-cell.paid { background: var(--paid-bg); border-color: var(--paid); cursor: not-allowed; }
.num-cell.paid .num { color: var(--paid); }
.num-cell.partial { background: #FFF7E6; border-color: #F59E0B; }

.status-stamp {
  font-size: 9px; font-weight: 700;
  padding: 2px 6px; border-radius: 4px; margin-top: 4px;
  display: inline-block;
}
.stamp-pending { background: var(--pending); color: #fff; }
.stamp-paid { background: var(--paid); color: #fff; }
.stamp-partial { background: #F59E0B; color: #fff; }

/* === MODAL === */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.55); z-index: 1000;
  align-items: center; justify-content: center; padding: 16px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface); border-radius: 14px;
  width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  border-top: 4px solid var(--gold);
}
.modal-header {
  padding: 20px 20px 12px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-title { font-size: 17px; font-weight: 700; }
.modal-body { padding: 20px; }
.modal-footer {
  padding: 12px 20px 20px;
  display: flex; gap: 8px; justify-content: flex-end;
}
.modal-num { font-size: 32px; font-weight: 700; letter-spacing: 6px; color: var(--red); text-align: center; margin-bottom: 16px; }
.btn-close { background: none; border: none; cursor: pointer; font-size: 20px; color: var(--text-secondary); padding: 4px; }

/* === REWARD PAGE === */
.reward-form { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 600px) { .reward-form { grid-template-columns: 1fr; } }
.reward-input-group { display: flex; flex-direction: column; gap: 6px; }
.reward-label { font-size: 12px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
.result-list { margin-top: 16px; }
.result-item { display:flex; align-items:center; justify-content:space-between; padding:16px 18px; border-radius:12px; margin-bottom:10px; border:2px solid; }
.result-item.r1  { background:linear-gradient(135deg,#FFF8E1,#FFF3CC); border-color:#C9A84C; box-shadow:0 4px 16px rgba(201,168,76,0.2); }
.result-item.r3f { background:linear-gradient(135deg,#E8F5E9,#D4EDDA); border-color:#2E7D32; }
.result-item.r3b { background:linear-gradient(135deg,#E3F2FD,#CCE5FF); border-color:#1565C0; }
.result-item.r2  { background:linear-gradient(135deg,#F3E5F5,#EDD5F5); border-color:#7B1FA2; }
.result-num { font-size: 20px; font-weight: 700; letter-spacing: 4px; }
.result-prize { font-size: 14px; font-weight: 600; }
.result-customer { font-size: 12px; color: var(--text-secondary); }

/* === SUMMARY === */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; margin-bottom: 16px; }
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 16px; text-align: center;
}
.stat-val { font-size: 28px; font-weight: 700; color: var(--red); }
.stat-label { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
.stat-card.green .stat-val { color: var(--green); }
.stat-card.gold .stat-val { color: var(--gold-dark); }
.stat-card.blue .stat-val { color: var(--blue); }

/* === TOAST === */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: #1a0a00; color: var(--gold); padding: 12px 24px;
  border-radius: 30px; font-size: 14px; font-weight: 600;
  z-index: 9999; transition: transform 0.3s; border: 1px solid var(--gold);
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* === TABLES === */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: var(--bg); padding: 10px 12px; text-align: left; font-weight: 700; color: var(--text-secondary); border-bottom: 2px solid var(--border); white-space: nowrap; }
td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tr:hover td { background: var(--bg); }

/* === BADGES === */
.badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
.badge-pending { background: var(--pending-bg); color: var(--pending); }
.badge-paid { background: var(--paid-bg); color: var(--paid); }
.badge-available { background: var(--green-light); color: var(--green); }

/* === PERIOD SELECTOR === */
.period-bar {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 16px;
  display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
  flex-wrap: wrap;
}
.period-label { font-size: 13px; font-weight: 700; color: var(--text-secondary); }
.period-select { padding: 6px 12px; border: 1.5px solid var(--border); border-radius: 6px; font-family: inherit; font-size: 13px; background: var(--bg); cursor: pointer; }

/* Progress bar */
.progress-bar { background: #EEE; border-radius: 20px; height: 8px; overflow: hidden; margin-top: 6px; }
.progress-fill { height: 100%; border-radius: 20px; background: linear-gradient(90deg, var(--gold) 0%, var(--red) 100%); transition: width 0.4s; }
</style>
</head>
<body>

<div class="header">
  <div class="header-brand">
    <div class="header-logo">🍀</div>
    <div>
      <div class="header-title">เสี่ยกร พารวย</div>
      <div class="header-sub">ระบบจัดการร้านล็อตเตอรี่</div>
    </div>
  </div>
  <div id="header-period" style="color:var(--gold-light);font-size:13px;text-align:right;"></div>
</div>

<nav class="nav">
  <button class="nav-btn active" onclick="showPage('receive')">📥 รับล็อตเตอรี่</button>
  <button class="nav-btn" onclick="showPage('sell')">🏷️ การจำหน่าย</button>
  <button class="nav-btn" onclick="showPage('reward')">🏆 ตรวจรางวัล</button>
  <button class="nav-btn" onclick="showPage('summary')">📊 สรุป</button>
</nav>

<!-- ===== PAGE 1: รับล็อตเตอรี่ ===== -->
<div id="page-receive" class="page active">
  <div class="card">
    <div class="card-title"><div class="card-title-icon">📅</div>งวดประจำวันที่</div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">งวดวันที่</label>
        <input type="date" id="receive-date" class="form-input">
      </div>
      <div class="form-group" style="justify-content:flex-end;">
        <label class="form-label">&nbsp;</label>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-outline" onclick="loadPeriod()">โหลดงวดที่มีอยู่</button>
          <button class="btn btn-danger btn-sm" onclick="confirmClearPeriod()">🗑 ล้างงวดนี้</button>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title"><div class="card-title-icon">🎫</div>เพิ่มชุดตัวเลข</div>
    <div class="lottery-input-row">
      <div class="form-group lotto-num">
        <label class="form-label">เลข 6 หลัก</label>
        <input type="text" id="num-input" class="form-input lotto-input" maxlength="6" placeholder="000000" oninput="this.value=this.value.replace(/\D/g,'')">
      </div>
      <div class="form-group">
        <label class="form-label">จำนวนชุด</label>
        <select id="copies-input" class="form-select">
          <option value="1">1 ใบ</option>
          <option value="2">2 ใบ</option>
        </select>
      </div>
      <div class="form-group" style="justify-content:flex-end;">
        <label class="form-label">&nbsp;</label>
        <button class="btn btn-outline" onclick="addLottoToList()">+ เพิ่ม</button>
      </div>
    </div>
    <div id="lotto-list" class="lotto-list"></div>
    <div id="receive-summary" style="display:none;background:var(--bg);padding:12px;border-radius:8px;margin-top:12px;font-size:13px;color:var(--text-secondary);"></div>
    <div style="margin-top:16px;display:flex;gap:8px;">
      <button class="btn btn-outline" onclick="clearLottoList()">🗑 ล้างรายการ</button>
      <button class="btn btn-gold" style="flex:1;justify-content:center;" onclick="saveReceive()">💾 บันทึกทั้งหมด</button>
    </div>
  </div>
</div>

<!-- ===== PAGE 2: จำหน่าย ===== -->
<div id="page-sell" class="page">
  <div class="period-bar">
    <span class="period-label">งวด:</span>
    <select id="sell-period" class="period-select" onchange="renderSellGrid()">
      <option value="">-- เลือกงวด --</option>
    </select>
    <div style="margin-left:auto;display:flex;gap:8px;">
      <span id="sell-stats" style="font-size:12px;color:var(--text-secondary);"></span>
    </div>
  </div>
  <div class="card" style="padding:16px;">
    <div class="search-bar">
      <input type="text" id="sell-search" class="form-input" placeholder="🔍 ค้นหาเลข..." oninput="renderSellGrid()" maxlength="6">
      <select id="sell-filter" class="form-select" style="width:140px;" onchange="renderSellGrid()">
        <option value="">ทั้งหมด</option>
        <option value="available">ว่างอยู่</option>
        <option value="pending">รอชำระ</option>
        <option value="paid">ชำระแล้ว</option>
      </select>
    </div>
    <div id="sell-grid" class="number-grid"></div>
  </div>
</div>

<!-- ===== PAGE 3: ตรวจรางวัล ===== -->
<div id="page-reward" class="page">
  <div class="period-bar">
    <span class="period-label">งวด:</span>
    <select id="reward-period" class="period-select">
      <option value="">-- เลือกงวด --</option>
    </select>
  </div>

  <!-- กรอกผลรางวัล -->
  <div class="card">
    <div class="card-title"><div class="card-title-icon">🏆</div>ผลรางวัล</div>

    <!-- รางวัลที่ 1 -->
    <div style="background:var(--gold-light);border-radius:8px;padding:14px;margin-bottom:14px;">
      <div style="font-size:13px;font-weight:700;color:var(--gold-dark);margin-bottom:10px;text-align:center;">รางวัลที่ 1</div>
      <input type="text" id="r1" class="form-input lotto-input" style="font-size:26px;" maxlength="6" placeholder="______" oninput="this.value=this.value.replace(/\D/g,'')">
    </div>

    <!-- 3 ตัวหน้า -->
    <div style="margin-bottom:14px;">
      <div style="font-size:13px;font-weight:700;color:var(--text-secondary);margin-bottom:8px;">เลข 3 ตัวหน้า</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <div>
          <div class="reward-label" style="margin-bottom:4px;">ชุดที่ 1</div>
          <input type="text" id="r3f" class="form-input" style="font-size:22px;font-weight:700;letter-spacing:6px;text-align:center;" maxlength="3" placeholder="___" oninput="this.value=this.value.replace(/\D/g,'')">
        </div>
        <div>
          <div class="reward-label" style="margin-bottom:4px;">ชุดที่ 2</div>
          <input type="text" id="r3f2" class="form-input" style="font-size:22px;font-weight:700;letter-spacing:6px;text-align:center;" maxlength="3" placeholder="___" oninput="this.value=this.value.replace(/\D/g,'')">
        </div>
      </div>
    </div>

    <!-- 3 ตัวหลัง -->
    <div style="margin-bottom:14px;">
      <div style="font-size:13px;font-weight:700;color:var(--text-secondary);margin-bottom:8px;">เลข 3 ตัวหลัง</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <div>
          <div class="reward-label" style="margin-bottom:4px;">ชุดที่ 1</div>
          <input type="text" id="r3b" class="form-input" style="font-size:22px;font-weight:700;letter-spacing:6px;text-align:center;" maxlength="3" placeholder="___" oninput="this.value=this.value.replace(/\D/g,'')">
        </div>
        <div>
          <div class="reward-label" style="margin-bottom:4px;">ชุดที่ 2</div>
          <input type="text" id="r3b2" class="form-input" style="font-size:22px;font-weight:700;letter-spacing:6px;text-align:center;" maxlength="3" placeholder="___" oninput="this.value=this.value.replace(/\D/g,'')">
        </div>
      </div>
    </div>

    <!-- 2 ตัวล่าง -->
    <div style="margin-bottom:16px;">
      <div style="font-size:13px;font-weight:700;color:var(--text-secondary);margin-bottom:8px;">เลข 2 ตัวล่าง</div>
      <input type="text" id="r2" class="form-input" style="font-size:22px;font-weight:700;letter-spacing:6px;text-align:center;" maxlength="2" placeholder="__" oninput="this.value=this.value.replace(/\D/g,'')">
    </div>

    <!-- hidden inputs ที่ยังต้องใช้ใน checkReward() -->
    <input type="hidden" id="rn1a"><input type="hidden" id="rn1b">
    <input type="hidden" id="r2nd"><input type="hidden" id="r3rd">
    <input type="hidden" id="r4"><input type="hidden" id="r5">

    <div style="display:flex;gap:8px;">
      <button class="btn btn-outline" onclick="clearRewardFields()">🗑 ล้างเลข</button>
      <button class="btn btn-gold" style="flex:1;justify-content:center;" onclick="checkReward()">🔍 ตรวจรางวัล</button>
    </div>
  </div>
  <div id="reward-results"></div>
</div>

<!-- ===== PAGE 4: สรุป ===== -->
<div id="page-summary" class="page">
  <div class="period-bar">
    <span class="period-label">งวด:</span>
    <select id="summary-period" class="period-select" onchange="renderSummary()">
      <option value="">-- เลือกงวด --</option>
    </select>
  </div>
  <div id="summary-content"></div>
</div>

<!-- ===== MODAL: บันทึกการขาย ===== -->

  <div style="color:#FFD700;font-size:14px;font-weight:600;">กำลังบันทึก...</div>
</div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>

<div id="toast" class="toast"></div>

<script>
// ============================================================
//  CONFIG — ใส่ URL Apps Script ที่ได้จาก Deploy ตรงนี้
// ============================================================
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyAQuLZpROzKz2Xj6njHzYevlI5I7hbTNJfoiU0M5aFuPWqihKbdfgaXfgArliM03o/exec';
// ============================================================

// ========== DATA LAYER ==========
// cache ใน memory ระหว่างเปิดหน้า (ไม่ใช้ localStorage อีกต่อไป)
let _cache = null;

async function api(action, body = {}) {
  // ใช้ GET + query string เพื่อหลีกเลี่ยง CORS preflight
  // Google Apps Script รองรับ doGet และไม่ต้องการ preflight สำหรับ simple request
  const url = SCRIPT_URL
    + '?action=' + encodeURIComponent(action)
    + '&payload=' + encodeURIComponent(JSON.stringify(body));
  const resp = await fetch(url);
  return resp.json();
}

// แปลง period key ใดๆ ให้เป็น YYYY-MM-DD เสมอ
function normalizePeriodKey(k) {
  if (!k) return k;
  // ถ้าเป็น ISO แล้ว (2026-06-16) คืนเลย
  if (/^\d{4}-\d{2}-\d{2}$/.test(k)) return k;
  // ถ้าเป็น date string แบบอื่น ลอง parse
  const d = new Date(k);
  if (!isNaN(d.getTime())) {
    return d.getFullYear() + '-'
      + String(d.getMonth()+1).padStart(2,'0') + '-'
      + String(d.getDate()).padStart(2,'0');
  }
  return k; // ถ้า parse ไม่ได้ คืนเดิม
}

async function loadAllData() {
  showLoading(true);
  try {
    const res = await api('getAllData');
    if (res.ok) {
      // normalize ทุก period key ให้เป็น YYYY-MM-DD
      const raw = res.data || {};
      const normalized = {};
      Object.keys(raw).forEach(k => {
        const nk = normalizePeriodKey(k);
        normalized[nk] = raw[k];
      });
      _cache = normalized;
    } else {
      alert('โหลดข้อมูลไม่ได้: ' + (res.error || ''));
      _cache = {};
    }
  } catch(e) {
    alert('เชื่อมต่อ Google Sheets ไม่ได้ กรุณาตรวจสอบ SCRIPT_URL');
    _cache = {};
  } finally {
    showLoading(false);
  }
}

function getData()      { return _cache || {}; }
function getCacheOrEmpty(period) {
  if (!_cache[period]) _cache[period] = { tickets: {}, sales: {} };
  return _cache[period];
}

function showLoading(on) {
  document.getElementById('loading-overlay').style.display = on ? 'flex' : 'none';
}

// ========== NAVIGATION ==========
function showPage(id, noEvent) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  if (!noEvent && event?.target) event.target.classList.add('active');
  if (id === 'sell')    { populatePeriodSelects(); renderSellGrid(); }
  if (id === 'reward')  { populatePeriodSelects(); }
  if (id === 'summary') { populatePeriodSelects(); renderSummary(); }
}

// ========== UTILS ==========
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
function formatDate(d) {
  if (!d) return '';
  const p = d.split('-');
  if (p.length !== 3) return d;
  const buddhistYear = (parseInt(p[0]) + 543).toString().slice(-2);
  return p[2] + '/' + p[1] + '/' + buddhistYear;
}

// ========== PERIOD ==========
function getAllPeriods() {
  const d = getData();
  return Object.keys(d).sort().reverse();
}
function populatePeriodSelects() {
  const periods = getAllPeriods();
  ['sell-period','reward-period','summary-period'].forEach(id => {
    const sel = document.getElementById(id);
    if (!sel) return;
    const cur = sel.value;
    sel.innerHTML = '<option value="">-- เลือกงวด --</option>';
    periods.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p; opt.textContent = formatDate(p);
      sel.appendChild(opt);
    });
    if (cur) sel.value = cur;
    if (!sel.value && periods.length) sel.value = periods[0];
  });
}

// ========== PAGE 1: RECEIVE ==========
let pendingLottos = [];

function addLottoToList() {
  const num = document.getElementById('num-input').value.trim();
  const copies = parseInt(document.getElementById('copies-input').value);
  if (num.length !== 6) { toast('กรุณากรอกเลข 6 หลัก'); return; }
  if (pendingLottos.find(l => l.num === num)) { toast('เลขนี้มีอยู่แล้ว'); return; }
  pendingLottos.push({ num, copies });
  document.getElementById('num-input').value = '';
  document.getElementById('copies-input').value = '1';
  renderLottoList();
  document.getElementById('num-input').focus();
}
document.getElementById('num-input').addEventListener('keydown', e => { if (e.key === 'Enter') addLottoToList(); });

function renderLottoList() {
  const list = document.getElementById('lotto-list');
  const sumEl = document.getElementById('receive-summary');
  if (!pendingLottos.length) { list.innerHTML = ''; sumEl.style.display = 'none'; return; }
  list.innerHTML = pendingLottos.map((l, i) => `
    <div class="lotto-item">
      <span class="lotto-num-badge">${l.num}</span>
      <span class="lotto-count-badge">${l.copies === 2 ? '2 ใบ' : '1 ใบ'}</span>
      <button class="btn btn-outline btn-sm" onclick="removeLotto(${i})">✕</button>
    </div>`).join('');
  const totalTickets = pendingLottos.reduce((s,l) => s + l.copies, 0);
  sumEl.style.display = 'block';
  sumEl.innerHTML = `รวม ${pendingLottos.length} เลข &nbsp;|&nbsp; ล็อตเตอรี่ทั้งหมด <strong>${totalTickets} ใบ</strong>`;
}

function removeLotto(i) { pendingLottos.splice(i,1); renderLottoList(); }
function clearLottoList() { pendingLottos = []; renderLottoList(); }

async function saveReceive() {
  const dateVal = document.getElementById('receive-date').value;
  if (!dateVal) { toast('กรุณาเลือกงวดวันที่'); return; }
  if (!pendingLottos.length) { toast('ยังไม่มีชุดตัวเลข'); return; }

  showLoading(true);
  try {
    const res = await api('saveTickets', { period: dateVal, tickets: pendingLottos });
    if (!res.ok) { toast('บันทึกไม่สำเร็จ: ' + res.error); return; }

    // อัปเดต cache
    if (!_cache[dateVal]) _cache[dateVal] = { tickets: {}, sales: {} };
    pendingLottos.forEach(l => {
      _cache[dateVal].tickets[l.num] = { num: l.num, copies: l.copies };
    });

    toast('บันทึกสำเร็จ ' + pendingLottos.length + ' เลข');
    pendingLottos = [];
    renderLottoList();
    populatePeriodSelects();
    document.getElementById('header-period').textContent = 'งวด ' + formatDate(dateVal);
  } catch(e) {
    toast('เกิดข้อผิดพลาด: ' + e.message);
  } finally {
    showLoading(false);
  }
}

function loadPeriod() {
  const periods = getAllPeriods();
  if (!periods.length) { toast('ยังไม่มีข้อมูลงวด'); return; }
  document.getElementById('receive-date').value = periods[0];
  toast('โหลดงวดล่าสุด: ' + formatDate(periods[0]));
}

async function confirmClearPeriod() {
  const dateVal = document.getElementById('receive-date').value;
  if (!dateVal) { toast('กรุณาเลือกงวดก่อน'); return; }
  const label = formatDate(dateVal);

  // ยืนยัน 3 ครั้ง
  const step1 = confirm('ต้องการล้างข้อมูลงวด ' + label + ' ทั้งหมดใช่ไหม?\n\n(ล็อตเตอรี่ + การขาย + ค่าต้นทุน จะถูกลบหมด)');
  if (!step1) return;
  const step2 = confirm('ยืนยันอีกครั้ง — ข้อมูลงวด ' + label + ' จะไม่สามารถกู้คืนได้\nแน่ใจหรือไม่?');
  if (!step2) return;
  const step3 = confirm('ยืนยันครั้งสุดท้าย — กด "ตกลง" เพื่อลบข้อมูลงวด ' + label + ' ถาวร');
  if (!step3) return;

  showLoading(true);
  try {
    const res = await api('clearPeriod', { period: dateVal });
    if (!res.ok) { toast('ล้างข้อมูลไม่สำเร็จ: ' + (res.error || '')); return; }
    if (_cache) delete _cache[dateVal];
    pendingLottos = [];
    renderLottoList();
    populatePeriodSelects();
    toast('ล้างข้อมูลงวด ' + label + ' แล้ว');
  } catch(e) {
    toast('เกิดข้อผิดพลาด: ' + e.message);
  } finally {
    showLoading(false);
  }
}

function updateHeaderPeriod(d) {
  document.getElementById('header-period').textContent = 'งวด ' + formatDate(d);
}

// ========== PAGE 2: SELL ==========
let currentEditSale = null;

function renderSellGrid() {
  const period = document.getElementById('sell-period').value;
  const search = document.getElementById('sell-search').value.trim();
  const filter = document.getElementById('sell-filter').value;
  const grid = document.getElementById('sell-grid');
  const statsEl = document.getElementById('sell-stats');

  if (!period) { grid.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:40px;">เลือกงวดก่อน</p>'; return; }
  const data = getData();
  const pd = data[period];
  if (!pd) { grid.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:40px;">ไม่มีข้อมูลงวดนี้</p>'; return; }

  // Build cell list
  // ชุด 2 ใบ: แสดง 1 ช่องรวมก่อน ถ้าขาย slot1 ไปแล้วค่อยแตกเป็น 2 ช่อง
  let cells = [];
  Object.keys(pd.tickets).sort().forEach(num => {
    const t = pd.tickets[num];
    if (t.copies === 2) {
      const sale1 = pd.sales?.[num];
      const sale2 = pd.sales?.[num + '_2'];
      if (!sale1 && !sale2) {
        // ยังไม่มีการขายเลย แสดง 1 ช่องรวม
        cells.push({ num, slotKey: num, copies:2, slot:0, sale:null, status:'available' });
      } else if (sale1 && sale2 && sale1.customer === sale2.customer) {
        // ลูกค้าคนเดียวซื้อทั้ง 2 ใบ แสดง 1 ช่องรวม
        const st = sale1.status === 'paid' ? 'paid' : 'pending';
        cells.push({ num, slotKey: num, copies:2, slot:'both', sale:sale1, status:st, bothSold:true });
      } else {
        // ขายแยก (ใบที่ 1 และใบที่ 2 ต่างลูกค้า หรือขายแค่ใบเดียว) แสดงแยก 2 ช่อง
        let st1 = sale1 ? (sale1.status === 'paid' ? 'paid' : 'pending') : 'available';
        let st2 = sale2 ? (sale2.status === 'paid' ? 'paid' : 'pending') : 'available';
        cells.push({ num, slotKey: num,      copies:2, slot:1, sale:sale1, status:st1 });
        cells.push({ num, slotKey: num+'_2', copies:2, slot:2, sale:sale2, status:st2 });
      }
    } else {
      const sale = pd.sales?.[num];
      let status = sale ? (sale.status === 'paid' ? 'paid' : 'pending') : 'available';
      cells.push({ num, slotKey: num, copies:1, slot:1, sale, status });
    }
  });

  // Filter
  if (search) cells = cells.filter(c => c.num.includes(search));
  if (filter) cells = cells.filter(c => {
    if (filter === 'available') return c.status === 'available';
    return c.status === filter;
  });

  // Stats - นับจาก cells ที่สร้างแล้ว (2-copy = 2 slots)
  const totalSlots = cells.length + (search || filter ? 0 : 0);
  const allSales = Object.values(pd.sales || {});
  const soldCount = allSales.length;
  const pendingCount = allSales.filter(v => v.status === 'pending').length;
  const paidCount = allSales.filter(v => v.status === 'paid').length;
  const totalSlotCount = Object.values(pd.tickets).reduce((s,t) => s+(t.copies||1),0);
  statsEl.innerHTML = `ทั้งหมด ${totalSlotCount} | ขายแล้ว ${soldCount} | รอชำระ ${pendingCount} | ชำระแล้ว ${paidCount}`;

  if (!cells.length) { grid.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:40px;">ไม่พบข้อมูล</p>'; return; }

  grid.innerHTML = cells.map(c => {
    let stamp = '';
    let cellClass = c.status;
    if (c.status === 'pending') stamp = `<div class="status-stamp stamp-pending">รอชำระ</div>`;
    else if (c.status === 'paid') stamp = `<div class="status-stamp stamp-paid">ชำระแล้ว</div>`;
    const clickable = c.status !== 'paid';
    let slotLabel = '';
    if (c.copies === 2 && c.bothSold)  slotLabel = `<div style="font-size:10px;color:var(--text-muted);">2 ใบ (ซื้อทั้งชุด)</div>`;
    else if (c.copies === 2 && c.slot > 0) slotLabel = `<div style="font-size:10px;color:var(--text-muted);">ใบที่ ${c.slot}/2</div>`;
    else if (c.copies === 2 && c.slot === 0) slotLabel = `<div style="font-size:10px;color:var(--text-muted);">2 ใบ</div>`;
    const custLabel = c.sale ? `<div style="font-size:10px;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:90px;">${c.sale.customer}</div>` : '';
    return `<div class="num-cell ${cellClass}" ${clickable ? `onclick="openSellModal('${c.slotKey}','${period}')"` : ''}>
      <div class="num">${c.num}</div>
      ${slotLabel}
      ${custLabel}
      ${stamp}
    </div>`;
  }).join('');
}

function openSellModal(slotKey, period) {
  const isSlot2 = slotKey.endsWith('_2');
  const num = isSlot2 ? slotKey.slice(0, -2) : slotKey;
  const data = getData();
  const ticket = data[period]?.tickets[num];
  const sale = data[period]?.sales?.[slotKey];
  currentEditSale = { slotKey, num, period };

  // ตรวจว่าเป็น slot รวม (2 ใบยังไม่ขายเลย), bothSold (ลูกค้าเดียวซื้อทั้ง 2), หรือ slot แยก
  const sale1 = data[period]?.sales?.[num];
  const sale2 = data[period]?.sales?.[num+'_2'];
  const isCombined = ticket?.copies === 2 && !isSlot2 && !sale1 && !sale2;
  const isBothSold = ticket?.copies === 2 && !isSlot2 && sale1 && sale2 && sale1.customer === sale2.customer;

  let headerLabel = num;
  if (isCombined)  headerLabel = num + '  [2 ใบ — เลือกจำนวน]';
  else if (isBothSold) headerLabel = num + '  [2 ใบ — ซื้อทั้งชุด]';
  else if (ticket?.copies === 2) headerLabel = num + (isSlot2 ? '  [ใบที่ 2]' : '  [ใบที่ 1]');

  document.getElementById('modal-num').textContent = headerLabel;
  document.getElementById('modal-number').value = slotKey;
  document.getElementById('modal-period').value = period;

  if (sale) {
    document.getElementById('modal-customer').value = sale.customer || '';
    document.getElementById('modal-channel').value = sale.channel || 'หน้าบ้าน';
    document.getElementById('modal-payment').value = sale.payment || 'เงินสด';
    document.getElementById('modal-status').value = sale.status || 'pending';
    document.getElementById('modal-paydate').value = sale.paydate || '';
  } else {
    document.getElementById('modal-customer').value = '';
    document.getElementById('modal-channel').value = 'หน้าบ้าน';
    document.getElementById('modal-payment').value = 'เงินสด';
    document.getElementById('modal-status').value = 'pending';
    document.getElementById('modal-paydate').value = '';
  }

  const qtyEl = document.getElementById('modal-qty');
  const infoEl = document.getElementById('modal-copies-info');
  if (isCombined) {
    qtyEl.innerHTML = '<option value="1">1 ใบ (เหลืออีก 1 ใบให้ขายต่อ)</option><option value="2">2 ใบ (ขายทั้งชุด)</option>';
    infoEl.style.display = 'block';
    infoEl.textContent = 'ชุดนี้มี 2 ใบ — ถ้าเลือก 1 ใบ ระบบจะแยกอีกใบออกมาให้ขายต่อได้';
  } else if (isBothSold) {
    qtyEl.innerHTML = '<option value="2">2 ใบ (ซื้อทั้งชุด)</option>';
    infoEl.style.display = 'block';
    infoEl.textContent = 'ลูกค้าซื้อทั้ง 2 ใบ — แก้ไขข้อมูลหรือสถานะได้';
  } else if (ticket?.copies === 2) {
    qtyEl.innerHTML = '<option value="1">1 ใบ</option>';
    infoEl.style.display = 'block';
    infoEl.textContent = 'กำลังบันทึก' + (isSlot2 ? 'ใบที่ 2' : 'ใบที่ 1');
  } else {
    qtyEl.innerHTML = '<option value="1">1 ใบ</option>';
    infoEl.style.display = 'none';
  }

  document.getElementById('sell-modal').classList.add('open');
}

function closeModal() { document.getElementById('sell-modal').classList.remove('open'); }

async function saveSale() {
  const slotKey  = document.getElementById('modal-number').value;
  const period   = document.getElementById('modal-period').value;
  const customer = document.getElementById('modal-customer').value.trim();
  const qty      = parseInt(document.getElementById('modal-qty').value) || 1;
  if (!customer) { toast('กรุณากรอกชื่อลูกค้า'); return; }

  const isSlot2    = slotKey.endsWith('_2');
  const num        = isSlot2 ? slotKey.slice(0,-2) : slotKey;
  const ticket     = _cache[period]?.tickets[num];
  const existSale1 = _cache[period]?.sales?.[num];
  const existSale2 = _cache[period]?.sales?.[num+'_2'];
  const isCombined = ticket?.copies === 2 && !isSlot2 && !existSale1 && !existSale2;
  const isBothSold = ticket?.copies === 2 && !isSlot2 && existSale1 && existSale2 && existSale1.customer === existSale2.customer;

  const saleObj = {
    channel: document.getElementById('modal-channel').value,
    payment: document.getElementById('modal-payment').value,
    status:  document.getElementById('modal-status').value,
    paydate: document.getElementById('modal-paydate').value,
  };

  showLoading(true);
  try {
    // isCombined + qty=2: บันทึกใหม่ทั้ง 2 slot
    // isBothSold: อัปเดตทั้ง 2 slot (แก้ชื่อ/สถานะพร้อมกัน)
    // ปกติ: บันทึก slot เดียว
    const slots = (isCombined && qty === 2) ? [slotKey, slotKey+'_2']
                : isBothSold ? [num, num+'_2']
                : [slotKey];
    for (const sk of slots) {
      const res = await api('saveSale', { period, slotKey: sk, customer, ...saleObj });
      if (!res.ok) { toast('บันทึกไม่สำเร็จ: ' + res.error); return; }
      if (!_cache[period].sales) _cache[period].sales = {};
      _cache[period].sales[sk] = { customer, ...saleObj, savedAt: new Date().toISOString() };
    }
    closeModal();
    renderSellGrid();
    toast('บันทึกสำเร็จ');
  } catch(e) {
    toast('เกิดข้อผิดพลาด: ' + e.message);
  } finally {
    showLoading(false);
  }
}

  rn1: { label: 'รางวัลใกล้เคียงที่ 1',  amount: 100000  },
  r2nd:{ label: 'รางวัลที่ 2',           amount: 200000  },
  r3rd:{ label: 'รางวัลที่ 3',           amount: 80000   },
  r3f: { label: 'เลข 3 ตัวหน้า',         amount: 4000    },
  r3b: { label: 'เลข 3 ตัวหลัง',         amount: 4000    },
  r4:  { label: 'รางวัลที่ 4',           amount: 40000   },

// ---------- ดึงผลรางวัลจาก URL ผ่าน GAS proxy ----------
async function fetchLottoResult() {
  const url = document.getElementById('reward-url').value.trim();
  if (!url) { toast('กรุณาใส่ URL ก่อน'); return; }
  const statusEl = document.getElementById('fetch-status');
  statusEl.textContent = '⏳ กำลังดึงข้อมูล...';
  statusEl.style.color = 'var(--text-muted)';
  showLoading(true);
  try {
    const res = await api('fetchLottoResult', { url });
    if (!res.ok) {
      statusEl.textContent = '❌ ' + (res.error || 'ดึงข้อมูลไม่สำเร็จ');
      statusEl.style.color = 'var(--red)';
      return;
    }
    const d = res.result;
    // เติมช่องทั้งหมด
    if (d.r1)   document.getElementById('r1').value   = d.r1;
    if (d.rn1a) document.getElementById('rn1a').value = d.rn1a;
    if (d.rn1b) document.getElementById('rn1b').value = d.rn1b;
    if (d.r3f)  document.getElementById('r3f').value  = d.r3f;
    if (d.r3f2) document.getElementById('r3f2').value = d.r3f2;
    if (d.r3b)  document.getElementById('r3b').value  = d.r3b;
    if (d.r3b2) document.getElementById('r3b2').value = d.r3b2;
    if (d.r2)   document.getElementById('r2').value   = d.r2;
    if (d.r2nd) document.getElementById('r2nd').value = d.r2nd;
    if (d.r3rd) document.getElementById('r3rd').value = d.r3rd;
    if (d.r4)   document.getElementById('r4').value   = d.r4;
    if (d.r5)   document.getElementById('r5').value   = d.r5;

    const filled = Object.values(d).filter(Boolean).length;
    statusEl.textContent = '✅ ดึงข้อมูลสำเร็จ — เติม ' + filled + ' รายการ';
    statusEl.style.color = 'var(--green)';
    toast('ดึงผลรางวัลสำเร็จ');
  } catch(e) {
    statusEl.textContent = '❌ ' + e.message;
    statusEl.style.color = 'var(--red)';
  } finally {
    showLoading(false);
  }
}

function checkReward() {
  const period = document.getElementById('reward-period').value;
  const r1   = document.getElementById('r1').value.trim();
  const rn1a = document.getElementById('rn1a').value.trim();
  const rn1b = document.getElementById('rn1b').value.trim();
  const r3f  = document.getElementById('r3f').value.trim();
  const r3f2 = document.getElementById('r3f2').value.trim();
  const r3b  = document.getElementById('r3b').value.trim();
  const r3b2 = document.getElementById('r3b2').value.trim();
  const r2   = document.getElementById('r2').value.trim();
  const r2nd = document.getElementById('r2nd').value.trim();
  const r3rd = document.getElementById('r3rd').value.trim();
  const r4raw = document.getElementById('r4').value.trim();
  const r5raw = document.getElementById('r5').value.trim();

  // parse list fields
  const r2ndList = r2nd ? r2nd.split(/[,\s]+/).map(s=>s.trim()).filter(s=>s.length===6) : [];
  const r3rdList = r3rd ? r3rd.split(/[,\s]+/).map(s=>s.trim()).filter(s=>s.length===6) : [];
  const r4list   = r4raw ? r4raw.split(/[,\s]+/).map(s=>s.trim()).filter(s=>s.length===4) : [];
  const r5list   = r5raw ? r5raw.split(/[,\s]+/).map(s=>s.trim()).filter(s=>s.length===3) : [];

  if (!period) { toast('กรุณาเลือกงวด'); return; }
  const hasAny = r1||rn1a||rn1b||r3f||r3f2||r3b||r3b2||r2||r2ndList.length||r3rdList.length||r4list.length||r5list.length;
  if (!hasAny) { toast('กรุณากรอกหรือดึงเลขรางวัลก่อน'); return; }

  const data = getData();
  const pd = data[period];
  if (!pd) { toast('ไม่มีข้อมูลงวดนี้'); return; }

  // สร้าง winners แบบ raw ก่อน (1 entry ต่อ slot)
  let rawWinners = [];
  Object.keys(pd.sales || {}).forEach(slotKey => {
    const sale = pd.sales[slotKey];
    if (!sale) return;
    const num = slotKey.endsWith('_2') ? slotKey.slice(0,-2) : slotKey;
    const prizes = [];

    if (r1   && r1.length===6   && num === r1)                prizes.push({ type:'r1',   ...PRIZES.r1   });
    if (rn1a && rn1a.length===6 && num === rn1a)              prizes.push({ type:'rn1',  ...PRIZES.rn1  });
    if (rn1b && rn1b.length===6 && num === rn1b)              prizes.push({ type:'rn1',  ...PRIZES.rn1  });
    if (r2ndList.includes(num))                               prizes.push({ type:'r2nd', ...PRIZES.r2nd });
    if (r3rdList.includes(num))                               prizes.push({ type:'r3rd', ...PRIZES.r3rd });
    if (r3f  && r3f.length===3  && num.slice(0,3)===r3f)     prizes.push({ type:'r3f',  ...PRIZES.r3f  });
    if (r3f2 && r3f2.length===3 && num.slice(0,3)===r3f2)    prizes.push({ type:'r3f',  ...PRIZES.r3f  });
    if (r3b  && r3b.length===3  && num.slice(3,6)===r3b)     prizes.push({ type:'r3b',  ...PRIZES.r3b  });
    if (r3b2 && r3b2.length===3 && num.slice(3,6)===r3b2)    prizes.push({ type:'r3b',  ...PRIZES.r3b  });
    if (r4list.some(n => num.slice(2,6)===n))                 prizes.push({ type:'r4',   ...PRIZES.r4   });
    if (r5list.some(n => num.slice(3,6)===n))                 prizes.push({ type:'r5',   ...PRIZES.r5   });
    if (r2   && r2.length===2   && num.slice(4,6)===r2)      prizes.push({ type:'r2',   ...PRIZES.r2   });

    if (prizes.length) rawWinners.push({ num, slotKey, customer: sale.customer, prizes, sale });
  });

  // รวม slot_2 ที่ลูกค้าชื่อเดียวกันเข้าด้วยกัน (ชุด 2 ใบ ซื้อโดยคนเดียว)
  let winners = [];
  const merged = new Set();
  rawWinners.forEach(w => {
    if (merged.has(w.slotKey)) return;
    if (w.slotKey.endsWith('_2')) {
      // ถ้า slot_2 ยังไม่ถูก merge จาก slot หลัก ให้เพิ่มตามปกติ
      winners.push(w); return;
    }
    // หา slot_2 ที่ num เดียวกัน ลูกค้าเดียวกัน
    const partner = rawWinners.find(x => x.slotKey === w.num + '_2' && x.customer === w.customer);
    if (partner) {
      // รวมรางวัลและคูณ 2 สำหรับรางวัลที่ซ้ำกัน
      const combinedPrizes = [...w.prizes];
      partner.prizes.forEach(pp => {
        const existing = combinedPrizes.find(cp => cp.type === pp.type);
        if (existing) existing.qty = (existing.qty || 1) + 1;
        else combinedPrizes.push({ ...pp, qty: 1 });
      });
      winners.push({ ...w, prizes: combinedPrizes, bothCopies: true });
      merged.add(partner.slotKey);
    } else {
      winners.push(w);
    }
  });

  const resEl = document.getElementById('reward-results');
  if (!winners.length) {
    resEl.innerHTML = `<div class="card" style="text-align:center;padding:32px;color:var(--text-muted);">
      <div style="font-size:40px;margin-bottom:8px;">😔</div>
      <div>ไม่มีล็อตเตอรี่ที่ขายออกไปถูกรางวัล</div></div>`;
    return;
  }

  resEl.innerHTML = `<div class="card">
    <div class="card-title"><div class="card-title-icon">🎉</div>ผู้โชคดีในงวดนี้</div>
    ${winners.map(w => {
      // คำนวณเงินรวม: ถ้า prize มี qty (ซื้อ 2 ใบ) ให้คูณด้วย qty
      const totalAmount = w.prizes.reduce((s,p) => s + p.amount * (p.qty || 1), 0);
      const prizeNames = w.prizes.map(p => p.label + (p.qty > 1 ? ' ×'+p.qty : '')).join(', ');
      const typeClass = w.prizes[0].type;
      const copiesLabel = w.bothCopies ? ' <span style="font-size:11px;background:var(--gold-light);color:var(--gold-dark);padding:2px 6px;border-radius:10px;">2 ใบ</span>' : '';
      return `<div class="result-item ${typeClass}">
        <div>
          <div class="result-num">${w.num}${copiesLabel}</div>
          <div class="result-customer">👤 ${w.customer} &nbsp;|&nbsp; ${w.sale.channel}</div>
          <div style="font-size:12px;margin-top:4px;color:var(--text-secondary);">${prizeNames}</div>
        </div>
        <div style="text-align:right;">
          <div class="result-prize" style="color:var(--red);">฿${totalAmount.toLocaleString()}</div>
          <button class="btn btn-sm btn-gold" style="margin-top:6px;" onclick="showWinnerCard('${w.customer}','${prizeNames}',${totalAmount},'${w.prizes[0].type}')">📸 บัตรอวยพร</button>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

    rn1:  { bg:'linear-gradient(135deg,#1a0a00,#5c3a00,#1a0a00)', accent:'#FFD700', sub:'#F5C842' },

// ========== PAGE 4: SUMMARY ==========
async function saveCostPrice(period) {
  const val = parseFloat(document.getElementById('cost-input').value) || 0;
  showLoading(true);
  try {
    const res = await api('saveConfig', { period, key: 'costPerTicket', value: val });
    if (!res.ok) { toast('บันทึกไม่สำเร็จ'); return; }
    if (_cache[period]) _cache[period].costPerTicket = val;
    renderSummary();
    toast('บันทึกราคาทุนแล้ว');
  } catch(e) {
    toast('เกิดข้อผิดพลาด: ' + e.message);
  } finally {
    showLoading(false);
  }
}

function renderSummary() {
  const period = document.getElementById('summary-period').value;
  const el = document.getElementById('summary-content');
  if (!period) { el.innerHTML = '<div class="card" style="text-align:center;color:var(--text-muted);padding:40px;">เลือกงวดก่อน</div>'; return; }

  const data = getData();
  const pd = data[period];
  if (!pd) { el.innerHTML = '<div class="card" style="text-align:center;color:var(--text-muted);padding:40px;">ไม่มีข้อมูล</div>'; return; }

  const tickets = pd.tickets || {};
  const sales = pd.sales || {};
  const costPerTicket = pd.costPerTicket || 0;
  const sellPrice = 100; // ราคาขายต่อใบ

  const totalTickets = Object.values(tickets).reduce((s,t) => s + (t.copies||1), 0);
  const soldTickets  = Object.keys(sales).length;
  const remainTickets = totalTickets - soldTickets;
  const customers = new Set(Object.values(sales).map(s => s.customer)).size;
  const paidSales    = Object.values(sales).filter(s => s.status === 'paid');
  const pendingSales = Object.values(sales).filter(s => s.status === 'pending');
  const paidAmount   = paidSales.length * sellPrice;
  const pendingAmount = pendingSales.length * sellPrice;

  // กำไร = (ยอดขายที่ชำระแล้ว) - (ต้นทุนที่ขายไป x ราคาทุน)
  const totalCost   = costPerTicket > 0 ? totalTickets * costPerTicket : 0;
  const soldRevenue = soldTickets * sellPrice;
  const profit      = costPerTicket > 0 ? soldRevenue - (soldTickets * costPerTicket) : null;
  const pctSold = totalTickets ? Math.round(soldTickets/totalTickets*100) : 0;

  el.innerHTML = `
    <div class="card">
      <div class="card-title"><div class="card-title-icon">💰</div>ราคาทุนต่อใบ (งวดนี้)</div>
      <div style="display:flex;gap:8px;align-items:center;">
        <input type="number" id="cost-input" class="form-input" style="max-width:160px;"
          placeholder="เช่น 83, 85, 87" value="${costPerTicket || ''}" min="0" max="200">
        <span style="font-size:13px;color:var(--text-secondary);">บาท/ใบ</span>
        <button class="btn btn-gold btn-sm" onclick="saveCostPrice('${period}')">บันทึก</button>
      </div>
      ${costPerTicket > 0 ? `<div style="margin-top:10px;font-size:13px;color:var(--text-secondary);">
        ต้นทุนรวม ${totalTickets} ใบ × ${costPerTicket} = <strong>฿${totalCost.toLocaleString()}</strong> &nbsp;|&nbsp;
        ขายที่ 100 บาท รายได้ ${soldTickets} ใบ = <strong>฿${soldRevenue.toLocaleString()}</strong>
      </div>` : ''}
    </div>

    <div class="stats-grid">
      <div class="stat-card"><div class="stat-val">${totalTickets.toLocaleString()}</div><div class="stat-label">ล็อตเตอรี่ทั้งหมด</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--pending);">${soldTickets.toLocaleString()}</div><div class="stat-label">ขายออกไปแล้ว</div></div>
      <div class="stat-card green"><div class="stat-val">${remainTickets.toLocaleString()}</div><div class="stat-label">คงเหลือ</div></div>
      <div class="stat-card blue"><div class="stat-val">${customers}</div><div class="stat-label">จำนวนลูกค้า</div></div>
      <div class="stat-card gold"><div class="stat-val">฿${paidAmount.toLocaleString()}</div><div class="stat-label">ชำระแล้ว</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--pending);">฿${pendingAmount.toLocaleString()}</div><div class="stat-label">รอชำระ</div></div>
      ${profit !== null ? `<div class="stat-card" style="border-color:${profit>=0?'var(--green)':'var(--red)'};">
        <div class="stat-val" style="color:${profit>=0?'var(--green)':'var(--red)'};">${profit>=0?'+':''}฿${profit.toLocaleString()}</div>
        <div class="stat-label">กำไร (จากที่ขายแล้ว)</div>
      </div>` : ''}
    </div>

    <div class="card">
      <div class="card-title"><div class="card-title-icon">📈</div>ความคืบหน้าการขาย</div>
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;">
        <span>ขายแล้ว ${soldTickets} / ${totalTickets} ใบ</span>
        <span style="font-weight:700;">${pctSold}%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pctSold}%"></div></div>
    </div>

    <div class="card">
      <div class="card-title"><div class="card-title-icon">📋</div>รายการการขาย</div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>เลข</th><th>ลูกค้า</th><th>ช่องทาง</th><th>ชำระ</th><th>สถานะ</th></tr></thead>
          <tbody>
            ${Object.entries(sales).map(([slotKey,s]) => {
              const dispNum = slotKey.endsWith('_2') ? slotKey.slice(0,-2)+' [ใบ2]' : slotKey;
              return `<tr>
              <td><strong style="color:var(--red);letter-spacing:2px;">${dispNum}</strong></td>
              <td>${s.customer}</td>
              <td><span style="font-size:12px;">${s.channel}</span></td>
              <td>${s.payment}</td>
              <td><span class="badge badge-${s.status}">${s.status === 'paid' ? 'ชำระแล้ว' : 'รอชำระ'}</span></td>
            </tr>`;}).join('') || '<tr><td colspan="5" style="text-align:center;color:var(--text-muted);">ยังไม่มีการขาย</td></tr>'}
          </tbody>
        </table>
      </div>
    </div>

    <div style="display:flex;gap:8px;margin-top:4px;">
      <button class="btn btn-gold btn-full" onclick="exportExcel('${period}')">📥 Export Excel</button>
    </div>`;
}

function exportExcel(period) {
  const data = getData();
  const pd = data[period];
  if (!pd) return;
  const rows = [['เลข','ลูกค้า','ช่องทาง','จำนวนใบ','ชำระ','สถานะ','วันชำระ']];
  Object.entries(pd.sales||{}).forEach(([num,s]) => {
    rows.push([num, s.customer, s.channel, s.qty, s.payment, s.status === 'paid' ? 'ชำระแล้ว' : 'รอชำระ', s.paydate||'']);
  });
  const csv = rows.map(r => r.join(',')).join('\n');
  const bom = '\uFEFF';
  const blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'lotto_' + period + '.csv'; a.click();
  URL.revokeObjectURL(url);
  toast('Export สำเร็จ');
}

window.onload = async () => {
  await loadAllData();
  populatePeriodSelects();
  const periods = getAllPeriods();
  if (periods.length) document.getElementById('header-period').textContent = 'งวด ' + formatDate(periods[0]);
  document.getElementById('receive-date').value = new Date().toISOString().slice(0,10);
};
</script>
